name: Deploy to Streamlit

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests
        run: |
          python -c "import streamlit; print('Streamlit version:', streamlit.__version__)"
          python -c "from config.settings import PAGE_CONFIG; print('Page config loaded successfully')"
          python -c "from src.draw_logic import DrawSystem; ds = DrawSystem(['test']); print('Draw system initialized successfully')"
          
      - name: Deploy to Streamlit Community Cloud
        run: echo "Deployment to Streamlit Community Cloud will be triggered automatically by GitHub push"
